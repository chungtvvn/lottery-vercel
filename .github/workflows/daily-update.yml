name: Daily Vina Lottery Static Generator

on:
  schedule:
    # Chạy hàng ngày lúc 18:45 VN (tương đương 11:45 UTC)
    - cron: '45 11 * * *'
  workflow_dispatch: # Cho phép chạy thủ công trên github

permissions:
  contents: write

jobs:
  generator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Pull Data & Generate Static JSON
        run: node scripts/update-static-data.js

      - name: Tự động commit và đẩy dữ liệu mới
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/data/xsmb-2-digits.json lib/data/statistics/*.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Kết quả xổ số & Thống kê Tĩnh (Bot)" && git push)
